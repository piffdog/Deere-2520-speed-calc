<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deere 2520 Speed Calculator</title>

<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body {
font-family: -apple-system, BlinkMacSystemFont, sans-serif;
background: #FFF1E5;
margin: 0;
padding: 20px;
}

.card {
max-width: 420px;
margin: auto;
background: white;
padding: 24px;
border-radius: 16px;
box-shadow: 0 10px 20px rgba(0,0,0,0.08);
}

input {
width: 100%;
padding: 10px;
font-size: 18px;
margin-top: 10px;
margin-bottom: 20px;
}

.result {
font-size: 20px;
margin-top: 10px;
}
</style>

</head>

<body>

<div class="card">
<h2>Deere 2520 Speed Calculator</h2>

<label>Target Speed (km/h)</label>
<input type="number" step="0.1" id="speed" value="5.0">

<div class="result">
Low Range RPM: <strong id="low"></strong>
</div>

<div class="result">
High Range RPM: <strong id="high"></strong>
</div>

</div>

<script>

function getRPM(speed, range){

const data = {
low:[
{rpm:1000,speed:2.9},
{rpm:1500,speed:4.3},
{rpm:2000,speed:6.0}
],

high:[
{rpm:1000,speed:8.2},
{rpm:1500,speed:12.0},
{rpm:2000,speed:16.0}
]
}

const points = data[range]

if(speed<=points[0].speed) return points[0].rpm
if(speed>=points[2].speed) return points[2].rpm

for(let i=0;i<points.length-1;i++){

let p1=points[i]
let p2=points[i+1]

if(speed>=p1.speed && speed<=p2.speed){

let ratio=(speed-p1.speed)/(p2.speed-p1.speed)

return Math.round(
p1.rpm + ratio*(p2.rpm-p1.rpm)
)

}
}

}

function update(){

let speed=parseFloat(
document.getElementById("speed").value
)

document.getElementById("low").innerText =
getRPM(speed,"low")

document.getElementById("high").innerText =
getRPM(speed,"high")

}

document.getElementById("speed")
.addEventListener("input",update)

update()

</script>

</body>
</html>
